<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Chat — Zyvenqo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        <h2 style="font-size:1.1rem">Global Chat</h2>
      </div>
      <div class="topbar-right">
        <span class="badge badge-green" id="online-count"><i class="fa-solid fa-circle" style="font-size:.5rem"></i> Online</span>
      </div>
    </div>

    <div class="card" style="height:calc(100vh - 140px);display:flex;flex-direction:column;overflow:hidden;padding:0">
      <div class="chat-messages" id="gc-messages"></div>
      <div class="chat-input-row">
        <label class="btn btn-ghost btn-icon" for="gc-img" title="Kirim gambar"><i class="fa-solid fa-image"></i></label>
        <input type="file" id="gc-img" accept="image/*" style="display:none" onchange="gcSendImg(this)">
        <textarea class="inp" id="gc-input" placeholder="Tulis pesan ke semua..." rows="1" onkeydown="gcKeydown(event)"></textarea>
        <button class="btn btn-primary btn-icon" onclick="gcSend()"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script type="module">
import { buildSidebar, initTheme, Auth, db, timeAgo, linkify, avatarHTML, uploadFile } from './app.js';
initTheme();
const u = Auth.requireAuth();
if(!u) throw new Error();
buildSidebar('chat');

const msgs = document.getElementById('gc-messages');
let users = {};

async function getUser(id) {
  if(users[id]) return users[id];
  const {data}=await db.from('users_Zyven').select('id,username,display_name,avatar_url').eq('id',id).single();
  if(data) users[id]=data;
  return data||{username:'?'};
}

async function load() {
  const {data}=await db.from('global_chat_Zyven').select('*').order('created_at',{ascending:true}).limit(80);
  msgs.innerHTML='';
  for(const m of (data||[])){
    const peer=await getUser(m.user_id);
    append(m,peer);
  }
  msgs.scrollTop=msgs.scrollHeight;
}
load();

function append(m, peer) {
  const own=m.user_id===u.id;
  const div=document.createElement('div');
  div.className=`chat-msg ${own?'own':''}`;
  let content='';
  if(m.message_type==='image'){
    content=`<img src="${m.media_url}" class="msg-img" onclick="window.open('${m.media_url}','_blank')">`;
  } else {
    content=`<div class="msg-bubble">${linkify(m.content)}</div>`;
  }
  div.innerHTML=`
    ${own?'':avatarHTML(peer,'sm')}
    <div>
      ${!own?`<div style="font-size:.72rem;font-weight:700;color:var(--accent3);margin-bottom:.2rem">@${peer.username}</div>`:''}
      ${content}
      <div class="msg-meta">${timeAgo(m.created_at)}</div>
    </div>
    ${own?avatarHTML(u,'sm'):''}
  `;
  msgs.appendChild(div);
}

// Realtime
db.channel('global-chat').on('postgres_changes',{event:'INSERT',schema:'public',table:'global_chat_Zyven'},async payload=>{
  if(payload.new.user_id!==u.id){
    const peer=await getUser(payload.new.user_id);
    append(payload.new,peer);
    msgs.scrollTop=msgs.scrollHeight;
  }
}).subscribe();

window.gcSend=async function(){
  const inp=document.getElementById('gc-input');
  const txt=inp.value.trim();
  if(!txt) return;
  inp.value='';
  const {data}=await db.from('global_chat_Zyven').insert({user_id:u.id,content:txt,message_type:'text'}).select().single();
  if(data){append(data,u);msgs.scrollTop=msgs.scrollHeight;}
};

window.gcKeydown=function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();gcSend();}};

window.gcSendImg=async function(inp){
  if(!inp.files[0]) return;
  const url=await uploadFile('chat-images',`${u.id}/${Date.now()}`,inp.files[0]);
  if(url){
    const {data}=await db.from('global_chat_Zyven').insert({user_id:u.id,content:'',message_type:'image',media_url:url}).select().single();
    if(data){append(data,u);msgs.scrollTop=msgs.scrollHeight;}
  }
  inp.value='';
};
</script>
</body>
</html>
