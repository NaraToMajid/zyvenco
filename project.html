<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyek — Zyvenqo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.project-layout{display:grid;grid-template-columns:240px 1fr;gap:0;height:calc(100vh - 120px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.file-panel{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.file-panel-header{padding:.75rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.file-list{flex:1;overflow-y:auto;padding:.4rem}
.editor-panel{display:flex;flex-direction:column;overflow:hidden}
.editor-topbar{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--border);background:var(--card2)}
.editor-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
#code-textarea{flex:1;width:100%;background:#0d0d14;border:none;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:.85rem;padding:1rem;resize:none;outline:none;line-height:1.7}
.proj-header{margin-bottom:1rem}
@media(max-width:700px){.project-layout{grid-template-columns:1fr;}.file-panel{height:auto;max-height:200px}}
</style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        <a href="projects.html" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-left"></i></a>
        <div>
          <h2 id="proj-title" style="font-size:1rem;margin:0">Memuat...</h2>
          <small id="proj-owner" class="text-muted"></small>
        </div>
      </div>
      <div class="topbar-right" id="proj-actions"></div>
    </div>

    <div class="project-layout" id="project-layout">
      <!-- FILE PANEL -->
      <div class="file-panel">
        <div class="file-panel-header">
          <span style="font-size:.8rem;font-weight:700;color:var(--text3)">FILE</span>
          <div class="flex gap-1" id="file-actions"></div>
        </div>
        <div class="file-list" id="file-list">
          <div class="empty-state"><i class="fa-solid fa-file"></i><p>Belum ada file</p></div>
        </div>
        <!-- Upload image -->
        <div id="img-upload-area" style="padding:.5rem;border-top:1px solid var(--border);display:none">
          <label class="btn btn-outline btn-sm w-full" for="img-file-input" style="justify-content:center">
            <i class="fa-solid fa-image"></i> Upload Gambar
          </label>
          <input type="file" id="img-file-input" accept="image/*" style="display:none" onchange="uploadImage(this)">
        </div>
      </div>

      <!-- EDITOR PANEL -->
      <div class="editor-panel">
        <div class="editor-topbar">
          <div class="flex items-center gap-1">
            <i class="fa-solid fa-pen-to-square" style="color:var(--accent3)"></i>
            <span style="font-size:.875rem;font-weight:600" id="current-file-name">Pilih file...</span>
            <span class="badge badge-purple" style="font-size:.65rem">Zyvedit</span>
            <span id="lock-badge" style="display:none" class="badge badge-yellow"><i class="fa-solid fa-lock"></i> Terkunci</span>
          </div>
          <div class="flex gap-1">
            <button class="btn btn-ghost btn-sm" id="btn-view" style="display:none" onclick="viewProject()"><i class="fa-solid fa-play"></i> View</button>
            <button class="btn btn-ghost btn-sm" id="btn-lock" style="display:none" onclick="toggleLock()"><i class="fa-solid fa-lock"></i></button>
            <button class="btn btn-primary btn-sm" id="btn-save" style="display:none" onclick="saveFile()"><i class="fa-solid fa-floppy-disk"></i> Simpan</button>
          </div>
        </div>
        <div class="editor-body">
          <div id="editor-empty" style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--text3)">
            <div class="text-center"><i class="fa-solid fa-code" style="font-size:2rem;margin-bottom:.75rem"></i><p>Pilih file untuk mulai edit</p></div>
          </div>
          <textarea id="code-textarea" style="display:none" placeholder="Tulis kode di sini..." spellcheck="false"></textarea>
          <img id="img-preview" style="display:none;max-height:100%;object-fit:contain;padding:1rem" alt="preview">
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { buildSidebar, initTheme, toast, Auth, db, timeAgo, openModal, closeModal, confirm2, langIcon, avatarHTML } from './app.js';
initTheme();
const u = Auth.current();
const pid = new URLSearchParams(location.search).get('id');
if(!pid) location.href = 'projects.html';

let project = null;
let files = [];
let currentFile = null;
let isOwner = false;

async function load() {
  const { data: p } = await db.from('projects_Zyven').select('*, users_Zyven(username,display_name,avatar_url)').eq('id', pid).single();
  if (!p) { toast('Proyek tidak ditemukan','error'); location.href='projects.html'; return; }
  project = p;
  isOwner = u && u.id === p.owner_id;

  // Check visibility
  if (p.visibility === 'private' && !isOwner && (!u || u.role !== 'admin')) {
    document.getElementById('project-layout').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><i class="fa-solid fa-lock"></i><p>Proyek ini bersifat privat</p></div>`;
    return;
  }

  // Increment views
  if (!isOwner) {
    await db.from('projects_Zyven').update({ views: (p.views||0)+1 }).eq('id', pid);
  }

  document.title = `${p.name} — Zyvenqo`;
  document.getElementById('proj-title').textContent = p.name;
  const owner = p.users_Zyven;
  document.getElementById('proj-owner').textContent = `oleh @${owner?.username||'?'} · ${timeAgo(p.updated_at)}`;

  // Proj actions
  const pa = document.getElementById('proj-actions');
  const starCount = document.createElement('span');
  starCount.id='star-count';
  const {data:stars}=await db.from('stars_Zyven').select('id',{count:'exact',head:true}).eq('project_id',pid);
  pa.innerHTML='';
  if(!isOwner){
    const {data:mystar}=u?await db.from('stars_Zyven').select('id').eq('project_id',pid).eq('user_id',u.id).single():{data:null};
    const starBtn = document.createElement('button');
    starBtn.className=`btn btn-sm ${mystar?'btn-primary':'btn-outline'}`;
    starBtn.id='star-btn';
    starBtn.onclick=toggleStar;
    starBtn.innerHTML=`<i class="fa-solid fa-star"></i> <span id="star-count">${stars?.count||0}</span>`;
    pa.appendChild(starBtn);
    const reportBtn=document.createElement('button');
    reportBtn.className='btn btn-ghost btn-sm';
    reportBtn.onclick=()=>reportProject();
    reportBtn.innerHTML='<i class="fa-solid fa-flag"></i>';
    pa.appendChild(reportBtn);
  }
  if(isOwner){
    pa.innerHTML+=`
      <span class="badge ${p.visibility==='private'?'badge-gray':'badge-green'}">${p.visibility==='private'?'Privat':'Publik'}</span>
      <button class="btn btn-outline btn-sm" onclick="openUploadModal()"><i class="fa-solid fa-upload"></i> Upload File</button>
      <button class="btn btn-ghost btn-sm" onclick="openNewFileModal()"><i class="fa-solid fa-file-plus"></i> File Baru</button>
    `;
    document.getElementById('file-actions').innerHTML=``;
    document.getElementById('img-upload-area').style.display='';
  }

  await loadFiles();
}

async function loadFiles() {
  const { data } = await db.from('files_Zyven').select('*').eq('project_id', pid).order('name');
  files = data || [];
  renderFileList();
  // Show view button if index.html exists
  const hasIndex = files.some(f=>f.name.toLowerCase()==='index.html');
  document.getElementById('btn-view').style.display = hasIndex?'':'none';
}

function renderFileList() {
  const list = document.getElementById('file-list');
  if (!files.length) {
    list.innerHTML = `<div class="empty-state"><i class="fa-solid fa-file"></i><p>Belum ada file</p></div>`;
    return;
  }
  list.innerHTML = files.map(f => {
    const locked = f.is_locked && !isOwner && (!u || u.role !== 'admin');
    const icon = langIcon(f.name);
    return `
      <div class="file-item ${currentFile?.id===f.id?'active':''} ${locked?'':''}
        " onclick="${locked?'':'openFile(\''+f.id+'\')'}">
        <i class="fa-solid ${icon.split(' ')[0]}" style="color:var(--${icon.split(' ')[1]?.replace('text-','')||'text3'})"></i>
        <span class="ellipsis" style="flex:1;font-size:.82rem">${f.name}</span>
        ${f.is_locked?`<i class="fa-solid fa-lock" style="font-size:.7rem;color:var(--yellow)"></i>`:''}
        ${locked?`<span style="font-size:.7rem;color:var(--text3)">${formatSize(f.file_size)}</span>`:''}
        ${isOwner?`<button class="btn btn-ghost" style="padding:.15rem .3rem;font-size:.7rem;color:var(--red)" onclick="event.stopPropagation();deleteFile('${f.id}','${f.name}')"><i class="fa-solid fa-xmark"></i></button>`:''}
      </div>
    `;
  }).join('');
}

function formatSize(b) {
  if(!b) return '0 B';
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}

window.openFile = function(id) {
  currentFile = files.find(f=>f.id===id);
  if(!currentFile) return;
  document.querySelectorAll('.file-item').forEach(el=>el.classList.remove('active'));
  const el = document.querySelector(`.file-item:nth-child(${files.indexOf(currentFile)+1})`);
  if(el) el.classList.add('active');
  renderFileList(); // re-render to update active

  document.getElementById('current-file-name').textContent = currentFile.name;
  document.getElementById('editor-empty').style.display='none';

  const isImg = /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(currentFile.name);
  if(isImg){
    document.getElementById('code-textarea').style.display='none';
    const imgEl = document.getElementById('img-preview');
    imgEl.style.display='block';
    imgEl.src=currentFile.content||'';
  } else {
    document.getElementById('img-preview').style.display='none';
    const ta=document.getElementById('code-textarea');
    ta.style.display='block';
    ta.value=currentFile.content||'';
    ta.readOnly = currentFile.is_locked && !isOwner;
  }

  document.getElementById('btn-save').style.display = isOwner?'':'none';
  document.getElementById('btn-lock').style.display = isOwner?'':'none';
  const lb=document.getElementById('lock-badge');
  lb.style.display=currentFile.is_locked?'':'none';
  document.getElementById('btn-lock').innerHTML = currentFile.is_locked?'<i class="fa-solid fa-lock-open"></i>':'<i class="fa-solid fa-lock"></i>';
  document.getElementById('btn-lock').title = currentFile.is_locked?'Buka Kunci':'Kunci File';
};

window.saveFile = async function() {
  if(!currentFile||!isOwner) return;
  const content = document.getElementById('code-textarea').value;
  const { error } = await db.from('files_Zyven').update({
    content, file_size: new Blob([content]).size, updated_at: new Date().toISOString()
  }).eq('id', currentFile.id);
  await db.from('projects_Zyven').update({updated_at:new Date().toISOString()}).eq('id',pid);
  if(!error){ toast('File disimpan','success'); currentFile.content=content; }
};

window.toggleLock = async function() {
  if(!currentFile||!isOwner) return;
  const locked=!currentFile.is_locked;
  await db.from('files_Zyven').update({is_locked:locked}).eq('id',currentFile.id);
  currentFile.is_locked=locked;
  toast(locked?'File dikunci':'File dibuka kuncinya','info');
  await loadFiles();
  openFile(currentFile.id);
};

window.viewProject = function() {
  window.open(`view.html?pid=${pid}`,'_blank');
};

window.openNewFileModal = function() {
  openModal(`
    <div class="modal-header"><h3><i class="fa-solid fa-file-plus"></i> File Baru</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div>
    <form onsubmit="createNewFile(event)" class="flex flex-col gap-2">
      <div class="form-group"><label>Nama File</label>
        <input class="inp" id="nf-name" placeholder="index.html" required maxlength="100">
      </div>
      <div class="form-group"><label>Konten Awal</label>
        <textarea class="inp" id="nf-content" rows="5" style="font-family:var(--mono);font-size:.82rem" placeholder="Isi kode di sini..."></textarea>
      </div>
      <div class="flex gap-1 justify-end">
        <button type="button" class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus"></i> Buat</button>
      </div>
    </form>
  `);
};

window.createNewFile = async function(e) {
  e.preventDefault();
  const name=document.getElementById('nf-name').value.trim();
  const content=document.getElementById('nf-content').value;
  const {error}=await db.from('files_Zyven').insert({project_id:pid,name,content,file_size:new Blob([content]).size,file_type:name.split('.').pop()});
  if(!error){closeModal();toast('File dibuat','success');await loadFiles();}
};

window.openUploadModal = function() {
  openModal(`
    <div class="modal-header"><h3><i class="fa-solid fa-upload"></i> Upload File</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div>
    <p style="font-size:.85rem;margin-bottom:1rem">Upload file teks, kode, atau gambar.</p>
    <input type="file" id="upload-input" multiple style="width:100%;padding:.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text)">
    <div id="upload-prog" class="mt-2"></div>
    <div class="flex gap-1 justify-end mt-2">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary btn-sm" onclick="doUploadFiles()"><i class="fa-solid fa-upload"></i> Upload</button>
    </div>
  `);
};

window.doUploadFiles = async function() {
  const input=document.getElementById('upload-input');
  const prog=document.getElementById('upload-prog');
  const flist=[...input.files];
  if(!flist.length) return;
  for(const file of flist){
    prog.innerHTML=`<div class="flex items-center gap-1"><span class="spinner-sm"></span><span style="font-size:.8rem">Uploading ${file.name}...</span></div>`;
    const isImg=/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(file.name);
    let content='';
    if(isImg){
      const {uploadFile}=await import('./db.js');
      const url=await uploadFile('project-files',`${pid}/${file.name}`,file);
      content=url||'';
    } else {
      content=await file.text();
    }
    await db.from('files_Zyven').upsert({project_id:pid,name:file.name,content,file_size:file.size,file_type:file.name.split('.').pop()},{onConflict:'project_id,name'});
  }
  closeModal();toast(`${flist.length} file berhasil diupload`,'success');
  await loadFiles();
};

window.uploadImage = async function(inp) {
  if(!inp.files[0]||!isOwner) return;
  const file=inp.files[0];
  const {uploadFile}=await import('./db.js');
  const url=await uploadFile('project-files',`${pid}/${file.name}`,file);
  await db.from('files_Zyven').upsert({project_id:pid,name:file.name,content:url||'',file_size:file.size,file_type:file.name.split('.').pop()},{onConflict:'project_id,name'});
  toast(`${file.name} diupload`,'success');
  await loadFiles();
};

window.deleteFile = function(id, name) {
  confirm2(`Hapus file "<strong>${name}</strong>"?`, async()=>{
    await db.from('files_Zyven').delete().eq('id',id);
    if(currentFile?.id===id){
      currentFile=null;
      document.getElementById('editor-empty').style.display='';
      document.getElementById('code-textarea').style.display='none';
      document.getElementById('btn-save').style.display='none';
      document.getElementById('btn-lock').style.display='none';
      document.getElementById('current-file-name').textContent='Pilih file...';
    }
    toast('File dihapus','success');
    await loadFiles();
  });
};

async function toggleStar(){
  if(!u){location.href='login.html';return;}
  const {data:existing}=await db.from('stars_Zyven').select('id').eq('project_id',pid).eq('user_id',u.id).single();
  const btn=document.getElementById('star-btn');
  const cnt=document.getElementById('star-count');
  if(existing){
    await db.from('stars_Zyven').delete().eq('id',existing.id);
    const cur=parseInt(cnt.textContent);
    await db.from('projects_Zyven').update({stars:Math.max(0,cur-1)}).eq('id',pid);
    cnt.textContent=Math.max(0,cur-1);
    btn.className='btn btn-sm btn-outline';
  } else {
    await db.from('stars_Zyven').insert({project_id:pid,user_id:u.id});
    const cur=parseInt(cnt.textContent);
    await db.from('projects_Zyven').update({stars:cur+1}).eq('id',pid);
    cnt.textContent=cur+1;
    btn.className='btn btn-sm btn-primary';
  }
}

function reportProject(){
  if(!u){location.href='login.html';return;}
  openModal(`
    <div class="modal-header"><h3><i class="fa-solid fa-flag"></i> Laporkan Proyek</h3>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div>
    <form onsubmit="submitReport(event)" class="flex flex-col gap-2">
      <div class="form-group"><label>Alasan</label>
        <textarea class="inp" id="rep-reason" rows="3" required placeholder="Jelaskan mengapa proyek ini perlu dilaporkan..."></textarea>
      </div>
      <div class="flex gap-1 justify-end">
        <button type="button" class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-danger btn-sm"><i class="fa-solid fa-flag"></i> Kirim Laporan</button>
      </div>
    </form>
  `);
}
window.submitReport=async function(e){
  e.preventDefault();
  await db.from('reports_Zyven').insert({reporter_id:u.id,target_type:'project',target_id:pid,reason:document.getElementById('rep-reason').value});
  closeModal();toast('Laporan terkirim ke admin','success');
};

window.buildSidebar=()=>{};
buildSidebar('projects');
load();

// Keyboard save
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveFile();}
});
</script>
</body>
</html>
