<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Zyvenqo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;transition:border-color .2s,transform .2s;cursor:pointer}
.proj-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.proj-lang{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block}
.activity-item{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
</style>
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        <h2 style="font-size:1.1rem">Dashboard</h2>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-icon" id="topbar-theme" onclick="doThemeToggle()" title="Toggle tema"><i class="fa-solid fa-moon"></i></button>
        <a href="projects.html?new=1" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus"></i> Proyek Baru</a>
      </div>
    </div>

    <!-- STATS -->
    <div class="grid-4 mb-3" id="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:rgba(108,99,255,.15);color:var(--accent3)"><i class="fa-solid fa-folder"></i></div><div><div class="stat-val" id="s-proj">—</div><div class="stat-label">Total Proyek</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(34,197,94,.15);color:var(--green)"><i class="fa-solid fa-file-code"></i></div><div><div class="stat-val" id="s-files">—</div><div class="stat-label">File</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(234,179,8,.15);color:var(--yellow)"><i class="fa-solid fa-star"></i></div><div><div class="stat-val" id="s-stars">—</div><div class="stat-label">Stars Diterima</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(6,182,212,.15);color:var(--cyan)"><i class="fa-solid fa-eye"></i></div><div><div class="stat-val" id="s-views">—</div><div class="stat-label">Total Views</div></div></div>
    </div>

    <div class="grid-2" style="gap:1.5rem">
      <!-- RECENT PROJECTS -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <h3>Proyek Terbaru</h3>
          <a href="projects.html" class="btn btn-ghost btn-sm">Lihat Semua <i class="fa-solid fa-arrow-right"></i></a>
        </div>
        <div id="recent-projects" class="flex flex-col gap-1">
          <div class="empty-state"><i class="fa-solid fa-folder-open"></i><p>Belum ada proyek</p></div>
        </div>
      </div>

      <!-- RECENT ACTIVITY / NOTIFICATIONS -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <h3>Aktivitas Terbaru</h3>
          <a href="notifications.html" class="btn btn-ghost btn-sm">Semua <i class="fa-solid fa-arrow-right"></i></a>
        </div>
        <div class="card" id="activity-list">
          <div class="empty-state"><i class="fa-solid fa-bell"></i><p>Belum ada aktivitas</p></div>
        </div>

        <!-- Quick chat preview -->
        <div class="mt-2">
          <div class="flex justify-between items-center mb-2">
            <h3>Global Chat</h3>
            <a href="chat.html" class="btn btn-ghost btn-sm">Buka <i class="fa-solid fa-arrow-right"></i></a>
          </div>
          <div class="card" id="global-preview" style="max-height:200px;overflow-y:auto"></div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>

<script type="module">
import { buildSidebar, initTheme, toast, Auth, db, timeAgo, avatarHTML } from './app.js';
initTheme();
const u = Auth.requireAuth();
if(!u) throw new Error();
buildSidebar('dashboard');

// Load stats
(async()=>{
  const [proj, stars, views] = await Promise.all([
    db.from('projects_Zyven').select('id, stars, views').eq('owner_id', u.id),
    db.from('stars_Zyven').select('id').eq('user_id', u.id),
    db.from('projects_Zyven').select('views').eq('owner_id', u.id)
  ]);
  const projects = proj.data || [];
  const totalViews = projects.reduce((s,p)=>s+(p.views||0),0);
  const totalStars = projects.reduce((s,p)=>s+(p.stars||0),0);
  const {data:files} = await db.from('files_Zyven').select('id').in('project_id', projects.map(p=>p.id));
  document.getElementById('s-proj').textContent = projects.length;
  document.getElementById('s-files').textContent = (files||[]).length;
  document.getElementById('s-stars').textContent = totalStars;
  document.getElementById('s-views').textContent = totalViews;

  // Recent projects
  const {data:recent} = await db.from('projects_Zyven').select('*').eq('owner_id',u.id).order('updated_at',{ascending:false}).limit(5);
  const rp = document.getElementById('recent-projects');
  if(recent&&recent.length){
    rp.innerHTML=recent.map(p=>`
      <div class="proj-card" onclick="location.href='project.html?id=${p.id}'">
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-1">
            <i class="fa-solid fa-folder text-accent" style="color:var(--accent3)"></i>
            <span style="font-weight:600;font-size:.9rem">${p.name}</span>
          </div>
          <span class="badge ${p.visibility==='private'?'badge-gray':'badge-green'}">${p.visibility==='private'?'Privat':'Publik'}</span>
        </div>
        ${p.description?`<p style="font-size:.8rem;margin-top:.4rem;color:var(--text3)">${p.description}</p>`:''}
        <div class="flex gap-2 mt-1" style="font-size:.75rem;color:var(--text3)">
          <span><i class="fa-solid fa-star"></i> ${p.stars}</span>
          <span><i class="fa-solid fa-eye"></i> ${p.views}</span>
          <span style="margin-left:auto">${timeAgo(p.updated_at)}</span>
        </div>
      </div>
    `).join('');
  }

  // Notifications
  const {data:notifs} = await db.from('notifications_Zyven').select('*').eq('user_id',u.id).order('created_at',{ascending:false}).limit(8);
  const al = document.getElementById('activity-list');
  if(notifs&&notifs.length){
    al.innerHTML=notifs.map(n=>`
      <div class="activity-item">
        <div class="activity-icon" style="background:rgba(108,99,255,.15);color:var(--accent3)"><i class="fa-solid fa-bell"></i></div>
        <div>
          <div style="font-size:.85rem;font-weight:600">${n.title}</div>
          <div style="font-size:.75rem;color:var(--text3)">${timeAgo(n.created_at)}</div>
        </div>
      </div>
    `).join('');
  }

  // Global chat preview
  const {data:gc} = await db.from('global_chat_Zyven').select('*, users_Zyven(username,display_name,avatar_url)').order('created_at',{ascending:false}).limit(6);
  const gp = document.getElementById('global-preview');
  if(gc&&gc.length){
    gp.innerHTML=[...gc].reverse().map(m=>`
      <div class="flex gap-1 items-center" style="padding:.4rem .65rem;font-size:.8rem">
        ${avatarHTML(m.users_Zyven||{username:'?'},'sm')}
        <div>
          <span style="font-weight:600;color:var(--accent3)">${(m.users_Zyven?.display_name||m.users_Zyven?.username||'?')}</span>
          <span style="color:var(--text2);margin-left:.4rem">${m.content}</span>
        </div>
      </div>
    `).join('');
  }
})();
</script>
</body>
</html>
