<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantuan — Zyvenqo</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        <h2 style="font-size:1.1rem">Bantuan & Saran</h2>
      </div>
    </div>

    <div style="max-width:700px">
      <div class="card mb-3">
        <h3 class="mb-2"><i class="fa-solid fa-paper-plane" style="color:var(--accent3)"></i> Kirim Pesan / Saran</h3>
        <form onsubmit="sendHelp(event)" class="flex flex-col gap-2">
          <div class="form-group">
            <label>Judul</label>
            <input class="inp" id="h-title" placeholder="Judul pesan atau saran" required maxlength="100">
          </div>
          <div class="form-group">
            <label>Tipe</label>
            <select class="inp" id="h-type">
              <option value="suggestion">Saran Fitur Baru</option>
              <option value="bug">Laporkan Bug</option>
              <option value="message">Pesan ke Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Isi Pesan</label>
            <textarea class="inp" id="h-content" rows="5" placeholder="Tulis detailnya di sini..." required maxlength="1000"></textarea>
          </div>
          <button class="btn btn-primary" type="submit" id="h-btn"><i class="fa-solid fa-paper-plane"></i> Kirim</button>
        </form>
      </div>

      <h3 class="mb-2">Riwayat Pengirimanmu</h3>
      <div id="history-list"></div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script type="module">
import { buildSidebar, initTheme, toast, Auth, db, timeAgo } from './app.js';
initTheme();
const u = Auth.requireAuth();
if(!u) throw new Error();
buildSidebar('help');

async function loadHistory(){
  const {data}=await db.from('suggestions_Zyven').select('*').eq('user_id',u.id).order('created_at',{ascending:false});
  const el=document.getElementById('history-list');
  if(!data||!data.length){el.innerHTML='<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Belum ada kiriman</p></div>';return;}
  const typeIcon={suggestion:'fa-lightbulb',bug:'fa-bug',message:'fa-envelope'};
  const typeLabel={suggestion:'Saran',bug:'Bug',message:'Pesan'};
  const statusColor={open:'badge-yellow',reviewed:'badge-cyan',closed:'badge-green'};
  const statusLabel={open:'Menunggu',reviewed:'Ditinjau',closed:'Selesai'};
  el.innerHTML=data.map(s=>`
    <div class="card mb-1">
      <div class="flex justify-between items-center mb-1">
        <div class="flex items-center gap-1">
          <i class="fa-solid ${typeIcon[s.type]}" style="color:var(--accent3)"></i>
          <span style="font-weight:600">${s.title}</span>
          <span class="badge badge-gray" style="font-size:.7rem">${typeLabel[s.type]}</span>
        </div>
        <span class="badge ${statusColor[s.status]}">${statusLabel[s.status]}</span>
      </div>
      <p style="font-size:.85rem">${s.content}</p>
      ${s.admin_reply?`<div style="margin-top:.75rem;padding:.65rem;background:var(--bg2);border-radius:var(--radius2);border-left:3px solid var(--accent)"><div style="font-size:.75rem;font-weight:700;color:var(--accent3);margin-bottom:.3rem"><i class="fa-solid fa-shield-halved"></i> Balasan Admin</div><p style="font-size:.85rem">${s.admin_reply}</p></div>`:''}
      <div style="font-size:.75rem;color:var(--text3);margin-top:.5rem">${timeAgo(s.created_at)}</div>
    </div>
  `).join('');
}
loadHistory();

window.sendHelp=async function(e){
  e.preventDefault();
  const btn=document.getElementById('h-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  const {error}=await db.from('suggestions_Zyven').insert({
    user_id:u.id,
    title:document.getElementById('h-title').value.trim(),
    type:document.getElementById('h-type').value,
    content:document.getElementById('h-content').value.trim()
  });
  if(!error){
    toast('Pesan terkirim ke admin','success');
    e.target.reset();
    loadHistory();
  } else toast(error.message,'error');
  btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Kirim';
};
</script>
</body>
</html>
