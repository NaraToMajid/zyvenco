<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zyvedit — Zyvenqo</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { overflow: hidden; }
    .zyvedit-shell {
      display: grid; grid-template-rows: 48px 1fr;
      height: 100vh; overflow: hidden;
    }
    .zyvedit-topbar {
      background: var(--bg-2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; padding: 0 12px;
      z-index: 10;
    }
    .zyvedit-body {
      display: grid; grid-template-columns: 200px 1fr;
      overflow: hidden;
    }
    .zyvedit-filepane {
      background: var(--bg-2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .zyvedit-filepane-header {
      padding: 8px 10px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-3); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .zyvedit-filepane-list {
      flex: 1; overflow-y: auto; padding: 4px;
    }
    .zyvedit-editor-pane {
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    .zyvedit-editor-tabs {
      display: flex; background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0;
    }
    .editor-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; font-size: 13px; font-family: var(--font-mono);
      color: var(--text-3); cursor: pointer;
      border-right: 1px solid var(--border);
      white-space: nowrap; transition: all var(--transition);
      flex-shrink: 0;
    }
    .editor-tab.active { background: var(--bg); color: var(--text); }
    .editor-tab .close-tab {
      opacity: 0; font-size: 11px; margin-left: 2px;
      transition: opacity var(--transition); padding: 2px;
      border-radius: 3px;
    }
    .editor-tab:hover .close-tab,
    .editor-tab.active .close-tab { opacity: 1; }
    .editor-tab .close-tab:hover { background: var(--bg-4); color: var(--danger); }
    .zyvedit-code {
      flex: 1; display: grid; grid-template-columns: auto 1fr;
      overflow: hidden;
    }
    .line-numbers {
      padding: 16px 12px; font-family: var(--font-mono); font-size: 13px;
      line-height: 1.7; text-align: right; color: var(--text-3);
      user-select: none; background: var(--bg); border-right: 1px solid var(--border);
      overflow: hidden; min-width: 40px;
    }
    .code-textarea {
      padding: 16px; font-family: var(--font-mono); font-size: 13px;
      line-height: 1.7; background: transparent; color: var(--text);
      border: none; resize: none; outline: none; overflow-y: auto;
      tab-size: 2; white-space: pre; overflow-x: auto;
      caret-color: var(--accent-2);
    }
    .zyvedit-statusbar {
      background: var(--accent); height: 22px;
      display: flex; align-items: center; padding: 0 12px;
      gap: 16px; font-size: 11px; color: rgba(255,255,255,0.85);
      font-family: var(--font-mono); flex-shrink: 0;
    }
    .zyvedit-statusbar span { display: flex; align-items: center; gap: 4px; }
    @media (max-width: 600px) {
      .zyvedit-body { grid-template-columns: 1fr; }
      .zyvedit-filepane { display: none; }
    }
  </style>
</head>
<body>
<div class="zyvedit-shell">
  <!-- TOPBAR -->
  <div class="zyvedit-topbar">
    <button class="btn btn-ghost btn-sm" id="btn-back"><i class="fa-solid fa-arrow-left"></i></button>
    <div style="width:1px;height:20px;background:var(--border)"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:14px;font-weight:800;color:var(--accent-2)">Zy</span>
      <span style="font-size:14px;font-weight:800">vedit</span>
    </div>
    <div style="font-size:12px;color:var(--text-3);margin-left:4px" id="topbar-project"></div>
    <div style="margin-left:auto;display:flex;gap:6px;">
      <button class="btn btn-secondary btn-sm" onclick="addNewFile()">
        <i class="fa-solid fa-plus"></i> File Baru
      </button>
      <button class="btn btn-primary btn-sm" id="btn-save" onclick="saveCurrentFile()">
        <i class="fa-solid fa-floppy-disk"></i> Simpan
      </button>
      <button class="btn btn-secondary btn-sm" onclick="viewProject()" id="btn-view-ze" style="display:none">
        <i class="fa-solid fa-eye"></i> View
      </button>
    </div>
  </div>

  <!-- BODY -->
  <div class="zyvedit-body">
    <!-- FILE PANE -->
    <div class="zyvedit-filepane">
      <div class="zyvedit-filepane-header">
        <span>Explorer</span>
        <button class="btn btn-ghost" style="padding:2px 5px;font-size:11px" onclick="addNewFile()">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>
      <div class="zyvedit-filepane-list" id="ze-file-list"></div>
    </div>

    <!-- EDITOR PANE -->
    <div class="zyvedit-editor-pane">
      <div class="zyvedit-editor-tabs" id="ze-tabs"></div>
      <div class="zyvedit-code" id="ze-code">
        <div style="display:flex;align-items:center;justify-content:center;flex:1;grid-column:1/-1;color:var(--text-3)">
          <div style="text-align:center">
            <i class="fa-solid fa-file-code" style="font-size:48px;opacity:0.15;display:block;margin-bottom:16px"></i>
            <div>Pilih file dari panel kiri untuk mulai editing</div>
          </div>
        </div>
      </div>
      <div class="zyvedit-statusbar">
        <span><i class="fa-solid fa-circle" style="font-size:8px;color:var(--success)"></i> Zyvedit</span>
        <span id="ze-filename">—</span>
        <span id="ze-lines">0 baris</span>
        <span id="ze-cursor">Ln 1, Col 1</span>
        <span id="ze-encoding">UTF-8</span>
      </div>
    </div>
  </div>
</div>

<!-- ADD FILE MODAL -->
<div class="modal-backdrop" id="modal-ze-add" style="display:none">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">Tambah File Baru</div>
      <button class="btn btn-ghost" onclick="closeZEModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <label class="input-label">Nama File</label>
        <input type="text" class="input" id="ze-new-filename" placeholder="mis. script.js, style.css"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeZEModal()">Batal</button>
      <button class="btn btn-primary btn-sm" onclick="doAddNewFile()">
        <i class="fa-solid fa-plus"></i> Tambah
      </button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { requireAuth, showToast, initTheme, fileTypeIcon } from './app.js';
import { supabase, getProjectById, getFilesByProject, createFile, updateFile, deleteFile } from './supabase.js';

const user = requireAuth();
if (!user) throw new Error();

const params = new URLSearchParams(location.search);
const projectId = params.get('id');
if (!projectId) { window.location.href = 'dashboard.html'; throw new Error(); }

initTheme(user);

let project = null;
let files = [];
let openTabs = []; // { file, dirty }
let activeTabId = null;
let isSaving = false;

document.getElementById('btn-back').onclick = () => {
  if (openTabs.some(t => t.dirty)) {
    if (!confirm('Ada perubahan yang belum disimpan. Tetap keluar?')) return;
  }
  window.location.href = 'project.html?id=' + projectId;
};

async function init() {
  const { data: proj } = await getProjectById(projectId);
  if (!proj) { alert('Proyek tidak ditemukan.'); history.back(); return; }
  project = proj;
  document.title = `Zyvedit — ${proj.name}`;
  document.getElementById('topbar-project').textContent = `/ ${proj.name}`;
  await refreshFiles();
}

async function refreshFiles() {
  const { data } = await getFilesByProject(projectId);
  files = data || [];

  const hasIndex = files.some(f => f.name.toLowerCase() === 'index.html');
  document.getElementById('btn-view-ze').style.display = hasIndex ? 'flex' : 'none';

  renderFileList();
  // Update tabs if open
  openTabs.forEach(tab => {
    const fresh = files.find(f => f.id === tab.file.id);
    if (fresh && !tab.dirty) tab.file = fresh;
  });
  renderTabs();
}

function renderFileList() {
  const list = document.getElementById('ze-file-list');
  if (!files.length) {
    list.innerHTML = `<div style="padding:16px 10px;text-align:center;color:var(--text-3);font-size:12px">
      Belum ada file.<br>Klik + untuk tambah.
    </div>`;
    return;
  }
  list.innerHTML = files.map(f => `
    <div class="file-item ${activeTabId === f.id ? 'active' : ''}" id="ze-fi-${f.id}" onclick="openTab('${f.id}')">
      <i class="${fileTypeIcon(f.name)}"></i>
      <span class="file-name truncate">${f.name}</span>
      ${f.is_locked ? `<i class="fa-solid fa-lock" style="font-size:10px;color:var(--warning)"></i>` : ''}
      <div style="margin-left:auto;display:flex;gap:1px;" onclick="event.stopPropagation()">
        <button class="btn btn-ghost" style="padding:1px 3px;font-size:10px" onclick="toggleLock('${f.id}',${f.is_locked})" title="${f.is_locked ? 'Buka kunci' : 'Kunci'}">
          <i class="fa-solid fa-${f.is_locked ? 'lock-open' : 'lock'}"></i>
        </button>
        <button class="btn btn-ghost" style="padding:1px 3px;font-size:10px;color:var(--danger)" onclick="doDeleteFile('${f.id}','${f.name}')" title="Hapus">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>`).join('');
}

window.openTab = function(fileId) {
  const file = files.find(f => f.id === fileId);
  if (!file) return;
  const existing = openTabs.findIndex(t => t.file.id === fileId);
  if (existing === -1) {
    openTabs.push({ file, dirty: false });
  }
  activeTabId = fileId;
  renderTabs();
  renderEditor();
  renderFileList();
}

function renderTabs() {
  const tabsEl = document.getElementById('ze-tabs');
  if (!openTabs.length) { tabsEl.innerHTML = ''; return; }
  tabsEl.innerHTML = openTabs.map(t => `
    <div class="editor-tab ${activeTabId === t.file.id ? 'active' : ''}" onclick="switchTab('${t.file.id}')">
      <i class="${fileTypeIcon(t.file.name)}" style="font-size:11px"></i>
      <span style="font-size:12px">${t.file.name}${t.dirty ? '<span style="color:var(--warning)"> *</span>' : ''}</span>
      <span class="close-tab" onclick="event.stopPropagation();closeTab('${t.file.id}')">
        <i class="fa-solid fa-xmark"></i>
      </span>
    </div>`).join('');
}

window.switchTab = function(fileId) {
  activeTabId = fileId;
  renderTabs(); renderEditor(); renderFileList();
}

window.closeTab = function(fileId) {
  const tab = openTabs.find(t => t.file.id === fileId);
  if (tab?.dirty) {
    if (!confirm(`File "${tab.file.name}" memiliki perubahan yang belum disimpan. Tutup?`)) return;
  }
  openTabs = openTabs.filter(t => t.file.id !== fileId);
  if (activeTabId === fileId) {
    activeTabId = openTabs.length ? openTabs[openTabs.length - 1].file.id : null;
  }
  renderTabs(); renderEditor(); renderFileList();
}

function renderEditor() {
  const codeEl = document.getElementById('ze-code');
  if (!activeTabId) {
    codeEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex:1;grid-column:1/-1;color:var(--text-3);text-align:center">
      <div>
        <i class="fa-solid fa-file-code" style="font-size:48px;opacity:0.15;display:block;margin-bottom:16px"></i>
        <div>Pilih file dari panel kiri</div>
      </div>
    </div>`;
    return;
  }

  const tab = openTabs.find(t => t.file.id === activeTabId);
  if (!tab) return;
  const file = tab.file;

  const isImage = ['png','jpg','jpeg','gif','svg','webp'].includes(file.name.split('.').pop()?.toLowerCase());

  if (isImage) {
    codeEl.innerHTML = `<div style="grid-column:1/-1;padding:24px;text-align:center">
      <img src="${file.content}" style="max-height:400px;max-width:100%;border-radius:var(--radius);border:1px solid var(--border)" />
      <div class="text-xs text-muted mt-8">${file.name}</div>
    </div>`;
    return;
  }

  const lines = (file.content || '').split('\n').length;
  document.getElementById('ze-filename').textContent = file.name;
  document.getElementById('ze-lines').textContent = `${lines} baris`;

  const lineNums = Array.from({length: lines}, (_,i) => i+1).join('\n');

  codeEl.innerHTML = `
    <div class="line-numbers" id="ze-line-nums">${lineNums}</div>
    <textarea class="code-textarea" id="ze-textarea" spellcheck="false">${escHTML(file.content || '')}</textarea>`;

  const ta = document.getElementById('ze-textarea');
  const ln = document.getElementById('ze-line-nums');

  ta.addEventListener('input', () => {
    tab.dirty = true;
    tab.file.content = ta.value;
    const l = ta.value.split('\n').length;
    ln.textContent = Array.from({length:l},(_,i)=>i+1).join('\n');
    document.getElementById('ze-lines').textContent = `${l} baris`;
    renderTabs();
  });

  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, end = ta.selectionEnd;
      ta.value = ta.value.substring(0,s) + '  ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s + 2;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault(); saveCurrentFile();
    }
  });

  ta.addEventListener('keyup', () => {
    const s = ta.selectionStart;
    const lines = ta.value.substring(0, s).split('\n');
    document.getElementById('ze-cursor').textContent = `Ln ${lines.length}, Col ${lines[lines.length-1].length+1}`;
  });

  ta.addEventListener('scroll', () => {
    ln.scrollTop = ta.scrollTop;
  });

  if (file.is_locked && user.id !== project?.owner_id && !user.is_admin) {
    ta.readOnly = true;
    ta.style.opacity = '0.6';
  }
}

function escHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.saveCurrentFile = async function() {
  if (!activeTabId || isSaving) return;
  const tab = openTabs.find(t => t.file.id === activeTabId);
  if (!tab) return;

  isSaving = true;
  const btn = document.getElementById('btn-save');
  btn.innerHTML = '<div class="spinner"></div>';

  const content = tab.file.content || '';
  const { error } = await updateFile(activeTabId, {
    content,
    size_bytes: new Blob([content]).size
  });

  isSaving = false;
  btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan';

  if (error) { showToast('Gagal menyimpan.', 'error'); return; }
  tab.dirty = false;
  renderTabs();
  showToast(`${tab.file.name} tersimpan.`, 'success');
}

window.addNewFile = function() {
  document.getElementById('ze-new-filename').value = '';
  document.getElementById('modal-ze-add').style.display = 'flex';
  requestAnimationFrame(() => document.getElementById('modal-ze-add').classList.add('show'));
  setTimeout(() => document.getElementById('ze-new-filename').focus(), 200);
}

window.doAddNewFile = async function() {
  const name = document.getElementById('ze-new-filename').value.trim();
  if (!name) { showToast('Nama file tidak boleh kosong.', 'error'); return; }
  const { data, error } = await createFile(projectId, name, '');
  if (error) { showToast('Gagal membuat file.', 'error'); return; }
  closeZEModal();
  showToast(`${name} dibuat.`, 'success');
  await refreshFiles();
  openTab(data.id);
}

window.toggleLock = async function(fileId, isLocked) {
  const { error } = await updateFile(fileId, { is_locked: !isLocked });
  if (error) { showToast('Gagal.', 'error'); return; }
  showToast(isLocked ? 'File dibuka.' : 'File dikunci.', 'success');
  await refreshFiles();
}

window.doDeleteFile = async function(fileId, name) {
  if (!confirm(`Hapus file "${name}"?`)) return;
  closeTab(fileId);
  await deleteFile(fileId);
  showToast(`${name} dihapus.`, 'success');
  await refreshFiles();
}

window.viewProject = function() {
  window.open(`viewer.html?id=${projectId}`, '_blank');
}

window.closeZEModal = function() {
  const m = document.getElementById('modal-ze-add');
  m.classList.remove('show');
  setTimeout(() => m.style.display = 'none', 200);
}

document.getElementById('modal-ze-add').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeZEModal();
});

document.getElementById('ze-new-filename').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAddNewFile();
});

window.showToast = showToast;
init();
</script>
</body>
</html>
